<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <rect width="400" height="200" fill="#0f172a"/>
  
  <!-- Cloud Platform -->
  <rect x="120" y="15" width="160" height="35" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4"/>
  <text x="200" y="38" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">上级运营平台</text>

  <!-- Connection Line -->
  <path d="M 200 50 L 200 110" stroke="#10b981" stroke-width="3" stroke-dasharray="6"/>
  <!-- Arrow -->
  <polygon points="195,60 205,60 200,50" fill="#10b981"/>
  <text x="215" y="85" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold">级联上报</text>

  <!-- Edge Gateway -->
  <rect x="140" y="110" width="120" height="40" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="135" fill="#fef3c7" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">接入网关</text>

  <!-- Local Devices -->
  <path d="M 200 150 L 200 165" stroke="#475569" stroke-width="2"/>
  <path d="M 160 165 L 240 165" stroke="#475569" stroke-width="2"/>
  <path d="M 160 165 L 160 175" stroke="#475569" stroke-width="2"/>
  <path d="M 240 165 L 240 175" stroke="#475569" stroke-width="2"/>
  <circle cx="160" cy="180" r="5" fill="#94a3b8"/>
  <circle cx="200" cy="180" r="5" fill="#94a3b8"/>
  <circle cx="240" cy="180" r="5" fill="#94a3b8"/>
  <path d="M 200 165 L 200 175" stroke="#475569" stroke-width="2"/>
</svg>
