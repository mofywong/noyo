<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <rect width="400" height="200" fill="#0f172a"/>
  <!-- Cloud Platform -->
  <rect x="120" y="10" width="160" height="30" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="30" fill="#bfdbfe" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">多租户运营平台</text>
  
  <!-- Lines to tenants -->
  <path d="M 200 40 L 200 60" stroke="#475569" stroke-width="2"/>
  <path d="M 80 60 L 320 60" stroke="#475569" stroke-width="2"/>
  <path d="M 80 60 L 80 80" stroke="#475569" stroke-width="2"/>
  <path d="M 200 60 L 200 80" stroke="#475569" stroke-width="2"/>
  <path d="M 320 60 L 320 80" stroke="#475569" stroke-width="2"/>

  <!-- Tenants -->
  <rect x="30" y="80" width="100" height="30" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="80" y="100" fill="#ddd6fe" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">租户 A</text>
  
  <rect x="150" y="80" width="100" height="30" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="200" y="100" fill="#d1fae5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">租户 B</text>

  <rect x="270" y="80" width="100" height="30" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="100" fill="#fef3c7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">租户 C</text>

  <!-- Projects for Tenant A -->
  <path d="M 80 110 L 80 125" stroke="#475569" stroke-width="2"/>
  <path d="M 50 125 L 110 125" stroke="#475569" stroke-width="2"/>
  <path d="M 50 125 L 50 140" stroke="#475569" stroke-width="2"/>
  <path d="M 110 125 L 110 140" stroke="#475569" stroke-width="2"/>
  <rect x="30" y="140" width="40" height="20" rx="2" fill="#334155"/>
  <text x="50" y="154" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">项目1</text>
  <rect x="90" y="140" width="40" height="20" rx="2" fill="#334155"/>
  <text x="110" y="154" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">项目2</text>

  <!-- Projects for Tenant B -->
  <path d="M 200 110 L 200 140" stroke="#475569" stroke-width="2"/>
  <rect x="170" y="140" width="60" height="20" rx="2" fill="#334155"/>
  <text x="200" y="154" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">多项目...</text>

  <!-- Projects for Tenant C -->
  <path d="M 320 110 L 320 140" stroke="#475569" stroke-width="2"/>
  <rect x="290" y="140" width="60" height="20" rx="2" fill="#334155"/>
  <text x="320" y="154" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">多项目...</text>
</svg>
