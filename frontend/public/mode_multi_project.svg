<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <rect width="400" height="200" fill="#0f172a"/>
  <!-- Single Organization -->
  <rect x="120" y="20" width="160" height="40" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="45" fill="#bfdbfe" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">集团总部 (单一租户)</text>
  
  <!-- Lines to projects -->
  <path d="M 200 60 L 200 90" stroke="#475569" stroke-width="2"/>
  <path d="M 80 90 L 320 90" stroke="#475569" stroke-width="2"/>
  <path d="M 80 90 L 80 120" stroke="#475569" stroke-width="2"/>
  <path d="M 200 90 L 200 120" stroke="#475569" stroke-width="2"/>
  <path d="M 320 90 L 320 120" stroke="#475569" stroke-width="2"/>

  <!-- Projects -->
  <rect x="30" y="120" width="100" height="35" rx="4" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <text x="80" y="142" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">项目 A</text>
  
  <rect x="150" y="120" width="100" height="35" rx="4" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <text x="200" y="142" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">项目 B</text>

  <rect x="270" y="120" width="100" height="35" rx="4" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <text x="320" y="142" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">项目 C</text>
</svg>
