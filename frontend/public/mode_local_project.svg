<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <rect width="400" height="200" fill="#0f172a"/>

  <!-- Dashed boundary representing closed environment -->
  <rect x="80" y="30" width="240" height="140" rx="8" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8"/>
  <text x="200" y="50" fill="#94a3b8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">单一闭环项目环境</text>

  <!-- Local Server -->
  <rect x="140" y="70" width="120" height="40" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="200" y="95" fill="#d1fae5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">本地系统 (单机)</text>

  <!-- Local Devices -->
  <path d="M 200 110 L 200 135" stroke="#475569" stroke-width="2"/>
  <path d="M 130 135 L 270 135" stroke="#475569" stroke-width="2"/>
  <path d="M 130 135 L 130 145" stroke="#475569" stroke-width="2"/>
  <path d="M 200 135 L 200 145" stroke="#475569" stroke-width="2"/>
  <path d="M 270 135 L 270 145" stroke="#475569" stroke-width="2"/>
  <rect x="115" y="145" width="30" height="15" rx="2" fill="#334155"/>
  <rect x="185" y="145" width="30" height="15" rx="2" fill="#334155"/>
  <rect x="255" y="145" width="30" height="15" rx="2" fill="#334155"/>
</svg>
